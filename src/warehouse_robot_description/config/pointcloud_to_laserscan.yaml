pointcloud_to_laserscan:
  ros__parameters:
    target_frame: lidar_link
    transform_tolerance: 0.01
    min_height: -0.05
    max_height: 0.05
    angle_min: -3.14159265359
    angle_max: 3.14159265359
    angle_increment: 0.017
    scan_time: 0.1
    range_min: 0.1
    range_max: 10.0
    use_inf: true
    inf_epsilon: 1.0
